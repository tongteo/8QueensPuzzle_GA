<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8 Queens Puzzle — Genetic Algorithm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1e1e2e;
      --border: #2d2d44;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #a78bfa;
      --btn-secondary-bg: #1e1e2e;
      --btn-secondary-hover: #2a2a3e;
      --board-light: #c8b8f0;
      --board-dark: #6d4fc2;
      --queen-light: #fde68a;
      --queen-dark: #f59e0b;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 24px;
    }

    header { text-align: center; }
    header h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p { margin-top: 6px; font-size: 0.85rem; color: var(--muted); }

    .stats { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 24px;
      text-align: center;
      min-width: 110px;
    }
    .stat-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .stat-card .value {
      font-size: 1.5rem; font-weight: 700; color: var(--accent);
      margin-top: 2px; font-variant-numeric: tabular-nums;
    }
    .stat-card .value.success { color: #34d399; }

    .board-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    table { border-collapse: collapse; }
    td {
      width: clamp(40px, 8vw, 58px);
      height: clamp(40px, 8vw, 58px);
      text-align: center;
      vertical-align: middle;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      /* NO transition — prevents flicker */
    }
    .light { background: var(--board-light); }
    .dark  { background: var(--board-dark); }
    .queen.light { background: var(--queen-light); }
    .queen.dark  { background: var(--queen-dark); }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 12px 32px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #solveBtn {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
    }
    #resetBtn {
      background: var(--btn-secondary-bg);
      color: var(--accent);
      border: 1px solid var(--border);
    }
    #themeBtn {
      background: var(--btn-secondary-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 16px;
    }
    #themeBtn:hover { background: var(--btn-secondary-hover); }

    /* Force light/dark override */
    [data-theme="light"] { --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#94a3b8;--accent:#7c3aed;--btn-secondary-bg:#f8fafc;--btn-secondary-hover:#e2e8f0;--board-light:#ede9fe;--board-dark:#7c3aed;--queen-light:#fde68a;--queen-dark:#d97706; }
    [data-theme="dark"]  { --bg:#0f0f1a;--surface:#1e1e2e;--border:#2d2d44;--text:#e2e8f0;--muted:#64748b;--accent:#a78bfa;--btn-secondary-bg:#1e1e2e;--btn-secondary-hover:#2a2a3e;--board-light:#c8b8f0;--board-dark:#6d4fc2;--queen-light:#fde68a;--queen-dark:#f59e0b; }

    #status { font-size: 0.85rem; color: var(--muted); min-height: 1.2em; text-align: center; }
    #status.running { color: #60a5fa; }
    #status.done    { color: #34d399; }
  </style>
</head>
<body>
  <header>
    <h1>8 Queens Puzzle</h1>
    <p>Solved with a Genetic Algorithm</p>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Generation</div>
      <div class="value" id="genVal">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Best Fitness</div>
      <div class="value" id="fitVal">—</div>
    </div>
  </div>

  <div class="board-wrapper">
    <table id="chessboard"></table>
  </div>

  <div class="controls">
    <button id="solveBtn">▶ Solve</button>
    <button id="resetBtn">↺ Reset</button>
    <button id="themeBtn" title="Toggle light/dark mode">🌙</button>
  </div>

  <p id="status">Press Solve to start.</p>

  <script src="ga.js"></script>
  <script>
    const themeBtn = document.getElementById("themeBtn");
    const root = document.documentElement;
    // Init from system preference
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    root.dataset.theme = prefersDark ? "dark" : "light";
    themeBtn.textContent = prefersDark ? "🌙" : "☀️";
    themeBtn.addEventListener("click", () => {
      const isDark = root.dataset.theme === "dark";
      root.dataset.theme = isDark ? "light" : "dark";
      themeBtn.textContent = isDark ? "☀️" : "🌙";
    });
  </script>
</body>
</html>
